name: Render and deploy Quarto site

on:
  push:
    branches:
      - main

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Quarto
        # använd v1 som finns och är stabil
        uses: quarto-dev/quarto-actions/setup-quarto@v1

      - name: Install LaTeX (optional, only if you need PDF build)
        run: sudo apt-get update && sudo apt-get install -y texlive-latex-recommended texlive-fonts-recommended texlive-latex-extra
        # Ta bort eller kommentera raden ovan om du inte behöver PDF/LaTeX.

      - name: Render site
        run: quarto render

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          publish_dir: ./_book
          github_token: ${{ secrets.GITHUB_TOKEN }}

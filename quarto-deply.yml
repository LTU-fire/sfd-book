name: Render and deploy Quarto site

on:
  push:
    branches:
      - main

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup-quarto@v2
        with:
          quarto-version: 'latest'  # eller en specifik version t.ex. '1.9.35'

      - name: Render site
        run: quarto render

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          deploy_key: ${{ secrets.DEPLOY_KEY }}        # optional if you prefer deploy key
          publish_dir: ./_site
          # Using GITHUB_TOKEN automatically (no extra secret) is supported for public repos,
          # but peaceiris suggests using PAT / deploy_key for private repos.
          github_token: ${{ secrets.GITHUB_TOKEN }}
